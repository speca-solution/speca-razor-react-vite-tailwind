name: CI

on:
  push:
    branches: [main]
  pull_request:

# Push beruntun: batalkan run lama, hanya commit terakhir yang diuji penuh.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Unit tests
        run: dotnet test Tests/Speca.Core.Tests/Speca.Core.Tests.csproj --nologo

      # Publish Release sekaligus menjalankan vite build (target MSBuild ViteBuildProduction).
      - name: Publish (Release)
        run: dotnet publish Apps/Portal/Speca.Portal.csproj -c Release -o out --nologo

      - name: Smoke (semua halaman + asset) + gRPC round-trip
        run: |
          # WAJIB jalankan dari dalam out/: ContentRoot default = cwd; jika diluncurkan
          # dari root repo, WebRoot salah → 'Manifest Vite tidak ditemukan' → HTTP 500
          # (gotcha terdokumentasi di CLAUDE.md). Subshell menjaga cwd yang benar.
          # Jwt__SigningKey: source ber-auth (useAuth) → app menolak start di Production
          # tanpa kunci (fail-closed). CI-only, bukan rahasia produksi.
          ( cd out && ASPNETCORE_ENVIRONMENT=Production \
            Jwt__SigningKey="ci-only-signing-key-min-32-chars-0123456789abcdef" \
            dotnet Speca.Portal.dll --urls http://localhost:5599 --AllowedHosts "*" ) &
          APP_PID=$!
          for i in $(seq 1 30); do
            curl -sf -o /dev/null http://localhost:5599/ && break
            sleep 1
          done
          node scripts/smoke-test.mjs http://localhost:5599
          S1=$?
          node --experimental-strip-types scripts/rpc-smoke.ts http://localhost:5599
          S2=$?
          # Auth security gate (login, rotasi, reuse-detection, family-revoke, logout).
          node --experimental-strip-types scripts/auth-smoke.ts http://localhost:5599
          S3=$?
          kill $APP_PID || true
          exit $(( S1 | S2 | S3 ))

  # Menjaga template `dotnet new`: instantiate kedua jalur (proto & none) harus build,
  # dan rename harus bersih (tak ada sisa identitas sumber).
  template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install template
        run: dotnet new install .

      - name: Instantiate (proto, + rename) → build
        run: |
          dotnet new speca-template -n CiProto --app-name Web -o /tmp/ciproto --no-restore
          test "$(grep -rIi speca /tmp/ciproto --include=*.cs --include=*.csproj --include=*.cshtml | wc -l)" = "0"
          test "$(grep -rIiw portal /tmp/ciproto --include=*.cs --include=*.csproj --include=*.cshtml | wc -l)" = "0"
          # Rename non-.NET (E10-05): Desktop/Mobile/scripts bersih dari identitas sumber
          # (kecuali ios project.pbxproj yang sengaja copyOnly — berisi kunci containerPortal).
          test "$(grep -rIi speca /tmp/ciproto/Apps/Desktop /tmp/ciproto/Apps/Mobile /tmp/ciproto/scripts --exclude=project.pbxproj | wc -l)" = "0"
          grep -q 'gradlePluginPortal()' /tmp/ciproto/Apps/Mobile/android/settings.gradle.kts
          test -f /tmp/ciproto/Apps/Desktop/src-tauri/resources/web/.gitkeep
          test -f /tmp/ciproto/scripts/desktop-publish-web.mjs
          dotnet build /tmp/ciproto/Apps/Web/CiProto.Web.csproj -c Debug --nologo

      - name: Instantiate (--platforms web) → assert ramping
        run: |
          dotnet new speca-template -n CiLean --platforms web -o /tmp/cilean --no-restore
          test ! -d /tmp/cilean/Apps/Desktop
          test ! -d /tmp/cilean/Apps/Mobile
          test ! -f /tmp/cilean/scripts/desktop-publish-portal.mjs
          ! grep -q 'protoc-gen-dart' /tmp/cilean/buf.gen.yaml
          ! grep -q '#if' /tmp/cilean/buf.gen.yaml

      - name: Instantiate (--data-comm none) → build + assert tanpa gRPC
        run: |
          dotnet new speca-template -n CiNone --data-comm none -o /tmp/cinone --no-restore
          test ! -d /tmp/cinone/Libs/Contracts
          test "$(grep -rIF 'AddGrpc' /tmp/cinone/Apps/Portal --include=*.cs | wc -l)" = "0"
          dotnet build /tmp/cinone/Apps/Portal/CiNone.Portal.csproj -c Debug --nologo
