name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Unit tests
        run: dotnet test Tests/Speca.Core.Tests/Speca.Core.Tests.csproj --nologo

      # Publish Release sekaligus menjalankan vite build (target MSBuild ViteBuildProduction).
      - name: Publish (Release)
        run: dotnet publish Apps/Portal/Speca.Portal.csproj -c Release -o out --nologo

      - name: Smoke (semua halaman + asset) + gRPC round-trip
        run: |
          ASPNETCORE_ENVIRONMENT=Production ASPNETCORE_URLS=http://localhost:5599 \
            dotnet out/Speca.Portal.dll &
          APP_PID=$!
          for i in $(seq 1 30); do
            curl -sf -o /dev/null http://localhost:5599/ && break
            sleep 1
          done
          node scripts/smoke-test.mjs http://localhost:5599
          S1=$?
          node --experimental-strip-types scripts/rpc-smoke.ts http://localhost:5599
          S2=$?
          kill $APP_PID || true
          exit $(( S1 | S2 ))

  # Menjaga template `dotnet new`: instantiate kedua jalur (proto & none) harus build,
  # dan rename harus bersih (tak ada sisa identitas sumber).
  template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install template
        run: dotnet new install .

      - name: Instantiate (proto, + rename) → build
        run: |
          dotnet new speca-template -n CiProto --app-name Web -o /tmp/ciproto --no-restore
          test "$(grep -rIi speca /tmp/ciproto --include=*.cs --include=*.csproj --include=*.cshtml | wc -l)" = "0"
          test "$(grep -rIiw portal /tmp/ciproto --include=*.cs --include=*.csproj --include=*.cshtml | wc -l)" = "0"
          dotnet build /tmp/ciproto/Apps/Web/CiProto.Web.csproj -c Debug --nologo

      - name: Instantiate (--data-comm none) → build + assert tanpa gRPC
        run: |
          dotnet new speca-template -n CiNone --data-comm none -o /tmp/cinone --no-restore
          test ! -d /tmp/cinone/Libs/Contracts
          test "$(grep -rIF 'AddGrpc' /tmp/cinone/Apps/Portal --include=*.cs | wc -l)" = "0"
          dotnet build /tmp/cinone/Apps/Portal/CiNone.Portal.csproj -c Debug --nologo
