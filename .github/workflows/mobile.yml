# CI mobile (Flutter): HANYA jalan bila file mobile / kontrak proto berubah.
# Ubuntu (1x kuota); Android SDK sudah tersedia di image runner.
name: Mobile

on:
  push:
    branches: [main]
    paths:
      - "Apps/Mobile/**"
      - "Libs/Contracts/Protos/**"
      - "buf.gen.yaml"
      - ".github/workflows/mobile.yml"
  pull_request:
    paths:
      - "Apps/Mobile/**"
      - "Libs/Contracts/Protos/**"
      - "buf.gen.yaml"
      - ".github/workflows/mobile.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Apps/Mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          cache: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('Apps/Mobile/android/**/*.gradle*', 'Apps/Mobile/pubspec.lock') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze

      - name: flutter test
        run: flutter test

      - name: flutter build apk (debug)
        run: flutter build apk --debug
