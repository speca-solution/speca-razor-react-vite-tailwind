# Generate klien TypeScript (protobuf-es v2) dari proto yang SAMA dengan server C#.
# Jalankan: pnpm buf:generate  (butuh @bufbuild/buf + @bufbuild/protoc-gen-es).
version: v2
clean: true
plugins:
  - local: protoc-gen-es
    out: Apps/Portal/Assets/gen
    opt:
      - target=ts
  #if (mobile)
  # Klien Dart untuk Apps/Mobile (Flutter) — butuh `dart pub global activate protoc_plugin`
  # (protoc-gen-dart di %LOCALAPPDATA%\Pub\Cache\bin, harus ada di PATH).
  - local: protoc-gen-dart
    out: Apps/Mobile/lib/gen
    opt:
      - grpc
  #endif
