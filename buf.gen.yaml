# Generate klien TypeScript (protobuf-es v2) dari proto yang SAMA dengan server C#.
# Jalankan: pnpm buf:generate  (butuh @bufbuild/buf + @bufbuild/protoc-gen-es).
version: v2
clean: true
plugins:
  - local: protoc-gen-es
    out: Apps/Portal/Assets/gen
    opt:
      - target=ts
  # Klien Dart untuk Apps/Mobile (Flutter) — aktifkan setelah Flutter SDK terpasang:
  #   dart pub global activate protoc_plugin
  # lalu hapus komentar blok di bawah ini.
  # - local: protoc-gen-dart
  #   out: Apps/Mobile/lib/gen
